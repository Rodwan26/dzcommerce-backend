version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dzcommerce
      POSTGRES_PASSWORD: dzcommerce
      POSTGRES_DB: dzcommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dzcommerce:dzcommerce@db:5432/dzcommerce
      DATABASE_SYNC_URL: postgresql://dzcommerce:dzcommerce@db:5432/dzcommerce
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
